# LLM Configuration for Virtual Company Platform
# Copy this file to config.yaml and fill in your API key

llm:
  provider: openai
  model: gpt-4
  api_key: ${OPENAI_API_KEY}  # Set OPENAI_API_KEY environment variable
  base_url: https://api.openai.com/v1

agent:
  max_steps: 20
  temperature: 0.7

permissions:
  default_level: ask
  trusted_dirs:
    - ./data

session:
  storage: jsonl
  directory: data/companys